services:
  # ----------------------------------------------------
  # 1. Backend Service (Java Spring Boot via Docker)
  # ----------------------------------------------------
  - type: web
    name: weather-app-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    autoDeploy: true
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false # Render will prompt you to enter this securely in the dashboard

  # ----------------------------------------------------
  # 2. Frontend Service (React + Vite Static Site)
  # ----------------------------------------------------
  - type: web
    name: weather-app-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: weather-app-backend
          property: url # Automatically uses the backend URL generated by Render
